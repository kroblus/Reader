name: Android quality gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Unit, lint, build and QA emulator
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify local quality gates
        run: bash ./gradlew :core-reader:testDebugUnitTest :core-formats:testDebugUnitTest :core-data:assemble :feature-reader:testDebugUnitTest :feature-download:testDebugUnitTest :app:testDebugUnitTest :core-reader:lintDebug :core-formats:lintDebug :core-data:lintDebug :feature-reader:lintDebug :feature-download:lintDebug :app:lintDebug :app:assembleDebug :app:assembleQaAndroidTest :app:assembleBenchmark :macrobenchmark:assemble --stacktrace
      - name: Run isolated QA instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          script: bash ./gradlew :app:connectedQaAndroidTest --stacktrace

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
