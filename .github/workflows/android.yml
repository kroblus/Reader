name: Android quality gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Unit, lint, build and QA emulator
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify local quality gates
        run: bash ./gradlew :core-reader:testDebugUnitTest :core-formats:testDebugUnitTest :core-data:assemble :feature-reader:testDebugUnitTest :feature-download:testDebugUnitTest :app:testDebugUnitTest :core-reader:lintDebug :core-formats:lintDebug :core-data:lintDebug :feature-reader:lintDebug :feature-download:lintDebug :app:lintDebug :app:assembleDebug :app:assembleQaAndroidTest :app:assembleBenchmark :macrobenchmark:assemble --stacktrace
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run PR user-journey smoke tests
        if: github.event_name == 'pull_request'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          script: |
            set +e
            ANDROID_SERIAL=emulator-5554 bash ./gradlew :app:connectedQaAndroidTest -Pandroid.testInstrumentationRunnerArguments.notClass=com.lightreader.app.LargeTxtImportInstrumentedTest,com.lightreader.app.HtmlBridgeInstrumentedTest,com.lightreader.app.journey.ReaderSystemBoundaryInstrumentedTest --stacktrace
            status=$?
            exit $status

      - name: Run main-branch complete deterministic journeys
        if: github.event_name == 'push'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          script: |
            set +e
            ANDROID_SERIAL=emulator-5554 bash ./gradlew :app:connectedQaAndroidTest -Pandroid.testInstrumentationRunnerArguments.notClass=com.lightreader.app.LargeTxtImportInstrumentedTest,com.lightreader.app.HtmlBridgeInstrumentedTest --stacktrace
            status=$?
            exit $status

      - name: Upload QA reports and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reader-qa-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
            app/build/outputs/connected_android_test_additional_output/

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
