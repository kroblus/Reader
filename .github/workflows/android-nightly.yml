name: Android nightly user matrix

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: read

jobs:
  qa-matrix:
    name: QA journeys on API ${{ matrix.api-level }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        api-level: [26, 35]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run complete deterministic QA matrix
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_2
          script: |
            set +e
            ANDROID_SERIAL=emulator-5554 bash ./gradlew :app:connectedQaAndroidTest -Pandroid.testInstrumentationRunnerArguments.notClass=com.lightreader.app.LargeTxtImportInstrumentedTest,com.lightreader.app.HtmlBridgeInstrumentedTest --stacktrace
            status=$?
            exit $status
      - name: Upload nightly reports and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reader-nightly-api-${{ matrix.api-level }}-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
            app/build/outputs/connected_android_test_additional_output/
