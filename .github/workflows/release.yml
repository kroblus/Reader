name: Signed Android release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and verify signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Materialize release keystore
        shell: bash
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          test -n "$RELEASE_STORE_PASSWORD"
          test -n "$RELEASE_KEY_ALIAS"
          test -n "$RELEASE_KEY_PASSWORD"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/lightreader-release.jks"
          test -s "$RUNNER_TEMP/lightreader-release.jks"
      - name: Build signed release APK
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/lightreader-release.jks
        run: bash ./gradlew :app:assembleRelease --stacktrace
      - name: Verify signed APK
        shell: bash
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          test -f "$APK"
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner"
          "$APKSIGNER" verify --verbose --print-certs "$APK"
      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: lightreader-signed-release
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk
